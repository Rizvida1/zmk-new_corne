# go to sleep after one hour (1*60*60*1000ms)

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

CONFIG_ZMK_SLEEP=y





CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# ── zmk-nice-oled Display Configuration ──────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_EPAPER_ON=y

# ── Performance (ePaper defaults from OPTIMIZE.md) ───────────────
CONFIG_LV_Z_MEM_POOL_SIZE=8192
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=2560

# ── WPM / animation: OFF ─────────────────────────────────────────
# Keep the screen conservative and stable: no extra animation widgets.
CONFIG_NICE_OLED_WIDGET_WPM=n

# ── Layer name: left side, as large as the module allows ─────────
# NOTE: the layer font is hardcoded in the module (pixel_operator_mono_16 —
# the largest font it ships); there is NO Kconfig option to enlarge it
# further. It is already the biggest text on screen, and with the
# overlapping Bongo Cat gone it now renders clean and legible at the left.
CONFIG_NICE_OLED_WIDGET_LAYER=y

# ── BT profile number: shrink it (you don't use the 1-of-5 indicator) ─
CONFIG_NICE_OLED_WIDGET_PROFILE_BIG=n

# ── Modifiers pressed: HORIZONTAL layout, LETTER style ────────────
# SYMBOL style uses bitmapped images (⊞ ⇧ Alt ⌃) which render as white
# rectangles on the 1-bit monochrome nice!view — most likely cause of the
# white box. LETTER style draws "C S A G" text boxes on the canvas instead:
# pure canvas text/rect, no image format issues on 1-bit displays.
# HOR layout in portrait canvas = physical vertical column on screen.
# CUSTOM_X=5, CUSTOM_Y=89: icons at portrait (5/19/33/47, 89), all within
# X:0-67 ✓; physical vertical column at X=70, Y=5/19/33/47.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_HOR=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_LETTER=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_X=5
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_Y=89

# ── CapsLock / HID indicators: DISABLED ────────────────────────
# Both bongo cat and luna show as a solid white square. Root cause: the HID
# indicator animimg is an LVGL child object of the canvas, and on the 1-bit
# monochrome nice!view the LVGL color pipeline doesn’t render these sprites
# correctly — it shows a white placeholder rectangle instead. This is a
# module rendering bug that cannot be fixed via Kconfig.
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=n

# ── WPM + Luna animation ─────────────────────────────────
# Luna (the running dog) is an LVGL child object using direct landscape
# coords (X:0-159, Y:0-67). ePaper default (100,15) puts it in the
# center-right area — clear of the modifier column at X≈70 and battery
# at X≈140. If luna renders as a white box (same 1-bit LVGL issue as HID
# indicators), disable it with CONFIG_NICE_OLED_WIDGET_WPM=n.
# NOTE: a separate CapsLock indicator is not possible via config; the HID
# indicators widget (the only mechanism) renders white on this 1-bit
# display regardless of style. Caps Word (double-shift) shows indirectly
# via the layer name changing instead.
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n

# ── Battery + signal: clean, no extra labels (right side) ────────
# The right half only reports its charge through the BLE proxy, so keep
# the proxy enabled. PERIPHERAL_ALL shows both halves (central + peripheral)
# and suppresses the hardcoded "SIG" label in output.c, so the readout
# stays label-free. The output widget renders the BT/USB connection
# (signal) status at the far-right edge automatically.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_NICE_OLED_WIDGET_CENTRAL_SHOW_BATTERY_PERIPHERAL_ALL=y
# Right half battery shows 0 until this is set; the module loops i=0 to
# SPLIT_TOTAL_DEVICES-1 when building the battery string.
CONFIG_NICE_OLED_SPLIT_TOTAL_DEVICES=2
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=146
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_X=26
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_Y=19
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_X=49
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_Y=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_X=45
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_Y=2
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_X=18
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=129

# Left→right layout on the 160×68 landscape display.
# Canvas widgets use portrait coords (landscape_X ≈ 159-portrait_Y, landscape_Y = portrait_X).
# LVGL object widgets (luna) use direct landscape coords.
#   X≈13       Layer name          (canvas, portrait 0,146)
#   X≈30       BT profile          (canvas, portrait 18,129; small)
#   X≈70       Modifiers C/S/A/G   (canvas HOR LETTER, portrait Y=89, physical Y=5/19/33/47)
#   X≈100-130  WPM Luna            (LVGL, landscape 100,15; disable if white box appears)
#   X≈140      Battery L% R%       (canvas, portrait 26,19; no labels)
#   X≈159      Output/signal       (canvas, portrait 49,0; BT/USB)

# Peripheral (right half): hammerbeam-slideshow (nice_view_custom shield)
# 30 images × 30s each = 900s total
CONFIG_CUSTOM_ANIMATION_SPEED=900000

# Uncomment the following line to enable NKRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Some operating systems have problems with full support for consumer keycodes.
# Uncomment the following line if keycodes labeled "consumer" like C_AC_SEARCH don't work
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Mouse enable
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

#soft off
CONFIG_ZMK_PM_SOFT_OFF=y