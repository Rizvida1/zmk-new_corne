# go to sleep after one hour (1*60*60*1000ms)

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

CONFIG_ZMK_SLEEP=y





CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# ── zmk-nice-oled Display Configuration ──────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_EPAPER_ON=y

# ── Performance (ePaper defaults from OPTIMIZE.md) ───────────────
CONFIG_LV_Z_MEM_POOL_SIZE=8192
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=3072

# ── Raw HID: clock, volume, layout, weather, media ──────────────
# Requires zmk-hid-host.silent.exe running on the PC (see AppData/Local/zmk-hid-host/).
# Layout list must match zmk-hid-host.json "layouts" EXACTLY (same length,
# same order). That json field must be actual two-letter layout codes used
# for OS-layout matching (NOT display labels) — "German" doesn't match
# anything, so the host app silently fell back to index 0 forever, which
# is why it always showed "German" regardless of your real layout. Fixed
# to a single "US" entry on both sides so there's no ambiguity.
# Weather uses wttr.in — change the city in zmk-hid-host.json.
# UPDATE: "127C" on screen was the module's hardcoded fallback/N/A value
# (screen.c: `state.temperature = 127; // N/A`), because the STOCK Windows
# build of zmk-hid-host (mctechnology17/qmk-hid-host fork) excludes weather
# entirely via `#![cfg(target_os = "macos")]`. PATCHED locally (see repo
# memory for exact diff) to remove that restriction, add the missing
# DataType::Weather byte for non-macOS, and wire it into Windows/Linux's
# provider list. Verified live: host now logs "Weather Provider got
# temperature: 31" and sends byte 0xAF to the keyboard correctly.
# Patched binary deployed to AppData/Local/zmk-hid-host/zmk-hid-host.silent.exe
# (original backed up as .orig-backup in the same folder). If this ever
# reverts to showing 127C, the stock exe was likely reinstalled/updated —
# rebuild from the local patched clone at C:\Users\RabR\dev\qmk-hid-host.
# Stack is bumped to 3072 above (Kconfig default when RAW_HID is enabled).
# Media: the module's "..._SPOTIFY_MACOS" flag listens on raw-HID byte
# 0xAE, which is the SAME byte qmk-hid-host uses for its generic, fully
# cross-platform _MEDIA_TITLE event — CONFIRMED via live logs (host sent
# artist on 0xAD and title on 0xAE while music was playing on Windows).
# Only the title (0xAE) is displayed by this module widget — no artist,
# no dedicated play/pause icon widget on the firmware side. PATCHED the
# host app instead (media/windows.rs) to prepend "> " (playing) or "||"
# (paused) directly onto the title text before sending it, so the existing
# title line doubles as a play/pause indicator with no firmware changes
# needed. Uses GetPlaybackInfo().PlaybackStatus() + PlaybackInfoChanged so
# it updates instantly on play/pause, not just on track change.
# Positions closed up (Weather 62, Time 74, Volume 86, Media 98) to fill
# the gap left by removing Layout — was 62/74/86(layout)/98/110.
CONFIG_NICE_OLED_WIDGET_RAW_HID=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_VOLUME=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_VOLUME_CUSTOM_Y=86
CONFIG_NICE_OLED_WIDGET_RAW_HID_WEATHER=y
# LAYOUT dropped per request — frees a line for media info instead.
CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT=n
CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT_LIST="US"
CONFIG_NICE_OLED_WIDGET_RAW_HID_MEDIA_PLAYER_SPOTIFY_MACOS=y
# Keep one full text step below volume to avoid row overlap on long titles.
CONFIG_NICE_OLED_WIDGET_RAW_HID_MEDIA_PLAYER_CUSTOM_Y=98

# ── WPM / animation: Bongo Cat ───────────────────────
# Re-enabling per request. The white square was very likely caused by
# CONFIG_NICE_OLED_WIDGET_OUTPUT_BACKGROUND (an unconditional white rect
# behind the BT/USB icon, now disabled below) rather than the animimg
# widgets themselves — worth retesting Bongo Cat now that's fixed.
# If the white box comes back, the LVGL animimg theory was right after
# all and this should go back to =n.
CONFIG_NICE_OLED_WIDGET_WPM=y

# ── Layer name: left side, as large as the module allows ─────────
# NOTE: the layer font is hardcoded in the module (pixel_operator_mono_16 —
# the largest font it ships); there is NO Kconfig option to enlarge it
# further. It is already the biggest text on screen, and with the
# overlapping Bongo Cat gone it now renders clean and legible at the left.
CONFIG_NICE_OLED_WIDGET_LAYER=y

# ── BT profile number: shrink it (you don't use the 1-of-5 indicator) ─
CONFIG_NICE_OLED_WIDGET_PROFILE_BIG=n

# ── Modifiers pressed: VERTICAL layout, ALIGN RIGHT, real Windows icons ──
# UPDATE: HOR+LETTER rendered as text ("CSAG") and NOT vertically stacked
# as expected. Switched to VER, which IS vertical (confirmed) — good.
# UPDATE 2: ALIGN_CENTER landed in the middle, overlapping the Raw HID
# text column. Switched to the module's built-in ALIGN_RIGHT, which
# hardcodes base_x = 68-14-2 = 52 (far edge of the portrait canvas) instead
# of computing a math-derived custom position — using the module's own
# "right" semantics rather than guessing coordinates, since our rotation
# math has already proven unreliable on this specific hardware once.
# Also switching LETTER → SYMBOL: the white-box bug was actually a
# duplicate CONFIG_NICE_OLED_WIDGET_WPM key overriding Luna back on
# (see below) — unrelated to these modifier bitmaps, worth using real
# icons now that the true cause is fixed.
# If ALIGN_RIGHT still isn't on the right edge, report what you see and
# we'll try ALIGN_LEFT + a custom CUSTOM_X instead.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_HOR=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_VER=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_VER_ALIGN_CENTER=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_VER_ALIGN_RIGHT=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_LETTER=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL=y
# With OUTPUT_BACKGROUND now disabld, switch back from the temporary
# LETTER fallback to real Windows symbols. If the white square returns,
# the remaining bitmap suspects are the modifier icons themselves or the
# WPM bongo cat, not the old output background rectangle.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=n
# NOTE: CUSTOM_X/Y intentionally omitted — VER+ALIGN_RIGHT hardcodes its
# own position in the module source and ignores these entirely.

# ── CapsLock / HID indicators: DISABLED ────────────────────────
# The bongo cat / luna sub-modes of THIS widget rendered as a solid white
# square. Root cause: the HID indicator animimg is an LVGL child object of
# the canvas, and on the 1-bit monochrome nice!view the LVGL color pipeline
# doesn’t render these specific sprites correctly. This is scoped to the
# HID indicators widget only — unrelated to the modifiers icons above,
# which use a different (canvas image draw) code path.
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=n

# ── WPM + Luna animation: DISABLED (found the white box bug!) ────
# This block used to say CONFIG_NICE_OLED_WIDGET_WPM=y + WPM_LUNA=y here,
# which SILENTLY OVERRODE the "WPM=n" set earlier in this file (line ~47).
# Kconfig .conf merging takes the LAST occurrence of a duplicate key — so
# Luna (an LVGL animimg sprite) was actually active the whole time, and is
# almost certainly the white box you've been seeing. Luna/Bongo Cat/HID
# indicators are all the same style of LVGL child-image object. UPDATE:
# re-enabling WPM_BONGO_CAT above (master WPM flag) now that the likely
# real culprit (OUTPUT_BACKGROUND rect) is disabled — Luna stays off since
# only bongo cat was requested back.
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y

# ── Battery + signal: single side (central), clean, no labels ────
# UPDATE: found a much more likely culprit for the persistent white square.
# output.c ALWAYS draws the BT/USB connection icon via lv_canvas_draw_img
# (a bitmap, same risk class as the modifier/Luna/Bongo images), AND —
# critically — CONFIG_NICE_OLED_WIDGET_OUTPUT_BACKGROUND defaults to "y"
# on ePaper and was NEVER set in this file, so the module has been drawing
# an unconditional solid 24x15px white background rectangle behind that
# icon this whole time (output.c: `lv_canvas_draw_rect(canvas, ..., &rect_
# white_dsc)`). This widget can't be disabled (it's the core connection
# indicator) but the background rect CAN be turned off — doing that now.
# Single-side battery: PERIPHERAL_ALL never actually showed the right
# half's charge (it wasn't reporting).
# CORRECTION: CONFIG_NICE_OLED_SPLIT_TOTAL_DEVICES is NOT a real Kconfig
# symbol — it's a C macro in util.h (`#define ... (1 + CONFIG_ZMK_SPLIT_
# BLE_CENTRAL_PERIPHERALS)`), computed automatically from the real ZMK
# peripheral count. Setting it directly in .conf broke the CI build
# ("undefined symbol"). There's no Kconfig-level way to shrink the battery
# array without changing the actual peripheral count (which would break
# split communication) — so single-side necessarily means going back to
# the plain single-value battery widget below, which DOES bring back the
# "SIG" text label (output.c only suppresses it when PERIPHERAL_ALL=y).
# Accepting that tradeoff since a single, always-accurate number matters
# more here than the label.
CONFIG_NICE_OLED_WIDGET_OUTPUT_BACKGROUND=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_NICE_OLED_WIDGET_CENTRAL_SHOW_BATTERY_PERIPHERAL_ALL=n
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=146
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_X=26
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_Y=19
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_X=49
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_Y=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_X=45
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_Y=2
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_X=18
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=133

# Left→right layout on the 160×68 landscape display.
# Canvas widgets use portrait coords (landscape_X ≈ 159-portrait_Y, landscape_Y = portrait_X).
# LVGL object widgets (luna) use direct landscape coords.
#   X≈13       Layer name          (canvas, portrait 0,146)
#   X≈30       BT profile          (canvas, portrait 18,133; small)
#   X≈?        Modifiers ⊞ ⇧ Alt ⌃ (canvas VER CENTER SYMBOL; position unconfirmed on this hardware — see note above)
#   X≈100-130  WPM Luna            (LVGL, landscape 100,15; disable if white box appears)
#   X≈140      Battery (central only, no labels) (canvas, portrait 26,19)
#   X≈159      Output / signal      (canvas, portrait 49,0; BT/USB icon, no background rect)

# Peripheral (right half): hammerbeam-slideshow (nice_view_custom shield)
# 30 images × 30s each = 900s total
CONFIG_CUSTOM_ANIMATION_SPEED=900000

# Uncomment the following line to enable NKRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Some operating systems have problems with full support for consumer keycodes.
# Uncomment the following line if keycodes labeled "consumer" like C_AC_SEARCH don't work
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Mouse enable
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

#soft off
CONFIG_ZMK_PM_SOFT_OFF=y