# go to sleep after one hour (1*60*60*1000ms)

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

CONFIG_ZMK_SLEEP=y





CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# ── zmk-nice-oled Display Configuration ──────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_EPAPER_ON=y

# ── Performance (ePaper defaults from OPTIMIZE.md) ───────────────
CONFIG_LV_Z_MEM_POOL_SIZE=8192
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=2560

# ── WPM / Bongo Cat: OFF ─────────────────────────────────────────
# Dropped to make room for the modifier indicator plus an unobstructed,
# clearly readable layer name. Re-enable WPM + WPM_BONGO_CAT at X≈45 if
# you ever want the animation back instead of the modifier row.
CONFIG_NICE_OLED_WIDGET_WPM=n

# ── Layer name: left side, as large as the module allows ─────────
# NOTE: the layer font is hardcoded in the module (pixel_operator_mono_16 —
# the largest font it ships); there is NO Kconfig option to enlarge it
# further. It is already the biggest text on screen, and with the
# overlapping Bongo Cat gone it now renders clean and legible at the left.
CONFIG_NICE_OLED_WIDGET_LAYER=y

# ── BT profile number: shrink it (you don't use the 1-of-5 indicator) ─
CONFIG_NICE_OLED_WIDGET_PROFILE_BIG=n

# ── Modifiers pressed: horizontal icon row, Windows symbols (center) ─
# Live ⊞ / Alt / ⇧ / ⌃ state — the "helpful info" you asked for. The
# icons render as one row offset from MODIFIERS_CUSTOM_X/Y (win/alt/shf/ctl
# at X+37/+51/+65/+78, direct landscape coords). The ePaper default X=62
# pushes them onto the battery, so shift to X=23 → icons land at landscape
# X≈60-101, centered and clear of both the layer name and the battery.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_BOX=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_VER=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_HOR=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_X=23
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_Y=62

# ── CapsLock indicator, drawn as a Bongo Cat (bottom-center) ─────
# One widget, double duty: the HID indicator reports CapsLock state, and
# in BONGO_CAT mode it renders the cat you preferred over Luna. The cat
# reacts to the lock state; ONLY_CAPSLOCK ignores num/scroll lock. It keys
# off HID indicators (auto-selects ZMK_HID_INDICATORS), NOT WPM, so there
# is no ZMK_WPM dependency and it stays light.
# Bongo cat is an LVGL object using DIRECT landscape coords. The ePaper
# default (100,8) sits on top of the battery, so drop it into the empty
# bottom-center strip: X=55 (right of the layer name, left of battery),
# Y=33 (just below the modifier row). Nudge X/Y after flashing if the
# sprite clips the battery (lower X) or the modifier row (raise Y).
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT_ONLY_CAPSLOCK=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_CUSTOM_X=55
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_CUSTOM_Y=33

# ── Battery + signal: clean, no extra labels (right side) ────────
# The right half only reports its charge through the BLE proxy, so keep
# the proxy enabled. PERIPHERAL_ALL shows both halves (central + peripheral)
# and suppresses the hardcoded "SIG" label in output.c, so the readout
# stays label-free. The output widget renders the BT/USB connection
# (signal) status at the far-right edge automatically.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_NICE_OLED_WIDGET_CENTRAL_SHOW_BATTERY_PERIPHERAL_ALL=y

# Clean left→right layout on the 160×68 landscape screen. Canvas-drawn
# widgets live on a 68×160 portrait canvas rotated 90° (landscape_X ≈
# 159 − portrait_Y); modifier icons use direct landscape coords.
#   X≈13     Layer name          (canvas, portrait 0,146 — largest font)
#   X≈30     BT profile number   (canvas, small now)
#   X≈60-101 Modifiers ⊞ Alt ⇧ ⌃ (icon row, center-top)
#   X≈55-95  CapsLock Bongo Cat  (LVGL, landscape 55,33 — bottom-center)
#   X≈140    Battery  L% R%      (canvas, portrait 26,19 — no labels)
#   X≈159    Output / signal     (canvas, portrait 49,0 — BT/USB status)

# Peripheral (right half): hammerbeam-slideshow (nice_view_custom shield)
# 30 images × 30s each = 900s total
CONFIG_CUSTOM_ANIMATION_SPEED=900000

# Uncomment the following line to enable NKRO
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Some operating systems have problems with full support for consumer keycodes.
# Uncomment the following line if keycodes labeled "consumer" like C_AC_SEARCH don't work
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Mouse enable
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

#soft off
CONFIG_ZMK_PM_SOFT_OFF=y